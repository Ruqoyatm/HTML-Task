<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-box">
        <div class="inner">
          <div class="top">
            <div class="topper">
              <img src="images/image-jeremy.jpg" alt="jeremy" />
            </div>
            <div class="page">
              <p>Repost for</p>
              <h2>
                Jeremy <br />
                Robson
              </h2>
            </div>
          </div>
          <div class="bottom">
            <p class="bottom-style">Daily</p>
            <p class="bottom-active">Weekly</p>
            <p class="bottom-style">Monthly</p>
          </div>
        </div>
      </div>

      <div class="right-box">
        <div class="box-1">
          <div class="nested-text1">
            <img src="images/icon-work.svg" alt="work" />
          </div>
          <div class="nested-1">
            <div class="one-box">
              <h4>Work</h4>
              <span>&#8230;</span>
            </div>
            <h2>32hrs</h2>
            <p>Last week &#8230; 36hrs</p>
          </div>
        </div>
        <div class="box-2">
          <div class="nested-text2">
            <img src="images/icon-play.svg" alt="play" />
          </div>
          <div class="nested-2">
            <div class="one-box">
              <h4>Play</h4>
              <span>&#8230;</span>
            </div>
            <h2>10hrs</h2>
            <p>Last week &#8230; 8hrs</p>
          </div>
        </div>

        <div class="box-3">
          <div class="nested-text3">
            <img src="images/icon-study.svg" alt="study" />
          </div>
          <div class="nested-3">
            <div class="one-box">
              <h4>Study</h4>
              <span>&#8230;</span>
            </div>
            <h2>4hrs</h2>
            <p>Last week &#45; 7hrs</p>
          </div>
        </div>
        <div class="box-4">
          <div class="nested-text4">
            <img src="images/icon-exercise.svg" alt="exercise" />
          </div>
          <div class="nested-4">
            <div class="one-box">
              <h4>Exercise</h4>
              <span>&#8230;</span>
            </div>
            <h2>4hrs</h2>
            <p>Last week &#45; 5hrs</p>
          </div>
        </div>
        <div class="box-5">
          <div class="nested-text5">
            <img src="images/icon-social.svg" alt="social" />
          </div>
          <div class="nested-5">
            <div class="one-box">
              <h4>Social</h4>
              <span>&#8230;</span>
            </div>
            <h2>5hrs</h2>
            <p>Last week &#45; 10hrs</p>
          </div>
        </div>
        <div class="box-6">
          <div class="nested-text6">
            <img src="images/icon-self-care.svg" alt="self-care" />
          </div>
          <div class="nested-6">
            <div class="one-box">
              <h4>Self care</h4>
              <span>&#8230;</span>
            </div>
            <h2>2hrs</h2>
            <p>Last week &#45; 2hrs</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
